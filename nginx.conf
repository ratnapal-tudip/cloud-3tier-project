events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format simple_upstream '$remote_addr "$request" $status upstream=$upstream_addr';
    access_log /var/log/nginx/access.log simple_upstream;

    # Define upstream group with all backends
    upstream backend_servers {
        server python-fastapi:8000;
        server nodejs:3000;
        server python-django:8001;
        server dotnet-webapi:5000;
    }

    server {
        listen 80;
        server_name localhost;

        # Serve React frontend with proper MIME types
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # Route API requests to backend servers (round-robin)
        location /api/ {
            proxy_pass http://backend_servers;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Health check endpoint (also round-robin)
        location /health {
            proxy_pass http://backend_servers;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
