events {}

http {
    # Serve all backends
    server {
        listen 80;
        server_name _;

        # -------------------------------------------------------------
        # DEFAULT BACKEND ROUTE
        # -------------------------------------------------------------
        # The frontend calls /api/auth/login, /api/me, etc.
        # Change the proxy_pass here to switch the active backend!
        # Options: 
        #   http://python-fastapi:8000/api/
        #   http://nodejs:3000/api/
        #   http://python-django:8001/api/
        #   http://dotnet-webapi:5000/api/
        # -------------------------------------------------------------
        location /api/ {
            proxy_pass http://nodejs:3000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Keep these if you want to call specific backends directly
        location /api/python-fastapi/ {
            proxy_pass http://python-fastapi:8000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/nodejs/ {
            proxy_pass http://nodejs:3000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/python-django/ {
            proxy_pass http://python-django:8001/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/dotnet/ {
            proxy_pass http://dotnet-webapi:5000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}