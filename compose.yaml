services:
  # MySQL Database (unchanged)
  mysql:
    image: mysql:8.0
    container_name: cloud3tier-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    # Remove ports if you don't need direct access
    # ports:
    #   - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/data.sql:/docker-entrypoint-initdb.d/data.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Python FastAPI Backend
  python-fastapi:
    build:
      context: ./backend/python-fastapi
      dockerfile: Dockerfile
    container_name: cloud3tier-fastapi
    restart: unless-stopped
    # Remove direct port exposure
    # ports:
    #   - "8000:8000"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: ${MYSQL_PORT}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      SECRET_KEY: ${SECRET_KEY:-super-secret-dev-key-change-in-production}
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/live')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Node.js Express Backend
  nodejs:
    build:
      context: ./backend/nodejs
      dockerfile: Dockerfile
    container_name: cloud3tier-nodejs
    restart: unless-stopped
    # Remove direct port exposure
    # ports:
    #   - "3000:3000"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: ${MYSQL_PORT}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      SECRET_KEY: ${SECRET_KEY:-super-secret-dev-key-change-in-production}
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Python Django Backend
  python-django:
    build:
      context: ./backend/python-django
      dockerfile: Dockerfile
    container_name: cloud3tier-django
    restart: unless-stopped
    # Remove direct port exposure
    # ports:
    #   - "8001:8001"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: ${MYSQL_PORT}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      SECRET_KEY: ${SECRET_KEY:-super-secret-dev-key-change-in-production}
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health/live')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # .NET WebAPI Backend
  dotnet-webapi:
    build:
      context: ./backend/dotnet-webapi
      dockerfile: Dockerfile
    container_name: cloud3tier-dotnet
    restart: unless-stopped
    # Remove direct port exposure
    # ports:
    #   - "5000:5000"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: ${MYSQL_PORT}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      SECRET_KEY: ${SECRET_KEY:-super-secret-dev-key-change-in-production}
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:5000/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: cloud3tier-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      python-fastapi:
        condition: service_healthy
      nodejs:
        condition: service_healthy
      python-django:
        condition: service_healthy
      dotnet-webapi:
        condition: service_healthy

volumes:
  mysql_data:
  