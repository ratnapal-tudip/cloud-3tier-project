services:
  # ---------------------------------------------------------------
  # MySQL Database (shared by all backends)
  # ---------------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: cloud3tier-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/data.sql:/docker-entrypoint-initdb.d/data.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------
  # Python FastAPI Backend
  # ---------------------------------------------------------------
  python-fastapi:
    build:
      context: ./backend/python-fastapi
      dockerfile: Dockerfile
    container_name: cloud3tier-fastapi
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: ${MYSQL_PORT}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      SECRET_KEY: ${SECRET_KEY:-super-secret-dev-key-change-in-production}
    depends_on:
      mysql:
        condition: service_healthy

